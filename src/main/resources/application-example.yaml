spring:
  application:
    name: skillMatch
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/skill_match
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:your_password}

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.skillmatch.domain.po
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
logging:
  level:
    root: info
    com.skillmatch: debug
    com.skillmatch.mapper: warn
gaoDe:
  key: ${GAODE_API_KEY:your_gaode_key}
